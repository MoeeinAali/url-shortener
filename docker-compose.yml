services:

  # --- Write DB (command side) --------------------------------------------
  postgres:
    image: docker.arvancloud.ir/postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d shortener"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Read DB (query side), persisted with AOF ---------------------------
  redis:
    image: docker.arvancloud.ir/redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Durable message bus (JetStream) ------------------------------------
  nats:
    image: docker.arvancloud.ir/nats:2
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data

  # --- Command + Query REST API -------------------------------------------
  api:
    build: .
    command: ["/app/api"]
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: "postgres://admin:admin@postgres:5432/shortener?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      NATS_URL: "nats://nats:4222"
      BASE_URL: "http://localhost:8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  # --- Transactional Outbox relay (outbox -> JetStream) -------------------
  relay:
    build: .
    command: ["/app/relay"]
    environment:
      POSTGRES_DSN: "postgres://admin:admin@postgres:5432/shortener?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      RELAY_POLL_INTERVAL: "1s"
      RELAY_BATCH_SIZE: "100"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  # --- Projector (JetStream -> read model) --------------------------------
  projector:
    build: .
    command: ["/app/projector"]
    environment:
      POSTGRES_DSN: "postgres://admin:admin@postgres:5432/shortener?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      NATS_URL: "nats://nats:4222"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  nats_data:
